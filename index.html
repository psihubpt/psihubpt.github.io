  <style>
    :root {
      --bg:       oklch(0.975 0.010 78);
      --fg:       oklch(0.18  0.022 60);
      --fg-muted: oklch(0.50  0.018 60);
      --orange:   oklch(0.63  0.19  46);
      --orange-lt:oklch(0.94  0.06  60);
      --border:   oklch(0.88  0.012 75);
      --serif:    'Playfair Display', Georgia, serif;
      --sans:     'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient blobs */
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, oklch(0.93 0.10 60 / 0.3), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, oklch(0.90 0.06 55 / 0.18), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      max-width: 540px; width: 100%;
      text-align: center;
    }

    /* Logo */
    .logo {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 48px;
      color: var(--fg-muted);
    }
    .logo span { color: var(--orange); }

    /* Illustration */
    .illustration {
      width: 180px;
      height: 180px;
      margin: 0 auto 36px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    /* Text */
    .headline {
      font-family: var(--serif);
      font-size: clamp(30px, 5vw, 44px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .headline em {
      font-style: italic;
      color: var(--orange);
    }

    .body-text {
      font-size: 16px;
      line-height: 1.75;
      color: var(--fg-muted);
      margin-bottom: 36px;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn-primary {
      background: var(--fg);
      color: var(--bg);
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--orange); transform: translateY(-2px); }

    .btn-ghost {
      background: transparent;
      color: var(--fg-muted);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }
    .btn-ghost:hover { border-color: var(--orange); color: var(--orange); transform: translateY(-1px); }

    /* Footer note */
    .footnote {
      margin-top: 48px;
      font-size: 12px;
      color: var(--fg-muted);
      opacity: 0.6;
    }

    /* Flip animação Casa/Cara */
    .flip-wrap {
  display: inline-block;
  position: relative;
  perspective: 300px;
}

.flip-s {
  display: inline-block;
  animation: flipOut 4s ease-in-out infinite;
  transform-origin: center;
}

.flip-r {
  display: inline-block;
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%) rotateX(90deg);
  animation: flipIn 4s ease-in-out infinite;
  animation-delay: 1.5s;
}

@keyframes flipOut {
  0%   { transform: rotateX(90deg); opacity: 0; }
  10%  { transform: rotateX(0deg);  opacity: 1; }
  40%  { transform: rotateX(0deg);  opacity: 1; }
  50%  { transform: rotateX(90deg); opacity: 0; }
  100% { transform: rotateX(90deg); opacity: 0; }
}

@keyframes flipIn {
  0%   { transform: translateY(-50%) rotateX(90deg); opacity: 0; }
  40%  { transform: translateY(-50%) rotateX(90deg); opacity: 0; }
  50%  { transform: translateY(-50%) rotateX(0deg);  opacity: 1; }
  90%  { transform: translateY(-50%) rotateX(0deg);  opacity: 1; }
  100% { transform: translateY(-50%) rotateX(90deg); opacity: 0; }
}

.flip-s {
  animation: flipOut 4s ease-in-out infinite;
}

.flip-r {
  animation: flipIn 4s ease-in-out infinite;
}
